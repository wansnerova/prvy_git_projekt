<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domovská stránka</title>
    <h1>Pekná stránočka :D</h1>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        
        nav {
            background-color: #444;
            overflow: hidden;
        }
        
        nav a {
            float: left;
            display: block;
            color: #fff;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        
        nav a:hover {
            background-color: #ddd;
            color: #000;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem 0;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Vítajte na našej stránke</h1>
    </header>
    
    <nav>
        <a href="#home">Domov</a>
        <a href="#about">O nás</a>
        <a href="#services">Služby</a>
        <a href="#contact">Kontakt</a>
    </nav>
    
    <main>
        <h2>Úvodný obsah</h2>
        <p>Toto je vzorová domovská stránka.</p>
    </main>
    
    <footer>
        <p>&copy; 2024 Všetky práva vyhradené.</p>
    </footer>
</body>
</html>
