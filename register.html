<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }

        nav {
            background-color: #444;
            overflow: hidden;
        }

        nav a {
            float: left;
            display: block;
            color: #fff;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: #ddd;
            color: #000;
        }

        main {
            max-width: 500px;
            margin: 2rem auto;
            padding: 1.5rem;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }

        form {
            display: grid;
            gap: 1rem;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 0.9rem;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .alt-link {
            text-align: center;
            margin-top: 1rem;
        }

        .alt-link a {
            color: #333;
            text-decoration: none;
        }

        .alt-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Registrácia</h1>
    </header>

    <nav>
        <a href="index.html">Domov</a>
        <a href="login.html">Prihlásenie</a>
        <a href="register.html">Registrácia</a>
    </nav>

    <main>
        <h2>Vytvorte si nový účet</h2>
        <form action="#" method="post">
            <div>
                <label for="username">Meno</label>
                <input type="text" id="username" name="username" placeholder="Vaše meno" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="napr. meno@domena.sk" required>
            </div>
            <div>
                <label for="password">Heslo</label>
                <input type="password" id="password" name="password" placeholder="Vaše heslo" required>
            </div>
            <div>
                <label for="confirm-password">Potvrdenie hesla</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Zadajte heslo znova" required>
            </div>
            <button type="submit">Registrovať sa</button>
        </form>
        <div class="alt-link">
            <p>Už máte účet? <a href="login.html">Prihláste sa</a></p>
        </div>
    </main>
</body>
</html>
